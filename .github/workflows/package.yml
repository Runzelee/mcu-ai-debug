name: Package Extensions

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-binaries:
    name: Build Rust Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-windows
          - os: macos-latest
            platform: darwin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Cross-compilation tools (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cross --git https://github.com/cross-rs/cross.git

      - name: Build Binaries (Linux & Windows via Cross)
        if: matrix.os == 'ubuntu-latest'
        run: |
          npm run build-rust-prod
        working-directory: packages/mcu-debug
        env:
          CI: true

      - name: Build Binaries (Darwin Native)
        if: matrix.os == 'macos-latest'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          # Run the main build script from root
          bash ./scripts/build-binaries.sh prod
        env:
          CI: true

      - name: Upload Binaries Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}
          path: packages/mcu-debug/bin/

  package:
    name: Package VSIX
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install

      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: bin-artifacts

      - name: Consolidate Binaries
        run: |
          mkdir -p packages/mcu-debug/bin
          
          echo "Downloaded artifacts structure:"
          ls -R bin-artifacts/
          
          # Copy binaries from the platform-specific artifact directories back to packages/mcu-debug/bin
          # The -r flag is used to copy directories recursively
          cp -rn bin-artifacts/binaries-linux-windows/* packages/mcu-debug/bin/ || true
          cp -rn bin-artifacts/binaries-darwin/* packages/mcu-debug/bin/ || true
          
          echo "Final consolidated binary structure:"
          ls -R packages/mcu-debug/bin/

      - name: Build and Package
        run: |
          # SKIP_RUST_BUILD prevents the build-rust.js from re-invoking compilation
          npm run package
        env:
          CI: true
          SKIP_RUST_BUILD: true

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.vsix
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
