name: Package Extensions

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-binaries:
    name: Build Rust Binaries
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-windows
          - os: macos-latest
            platform: darwin

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Cross-compilation tools (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo install cross --git https://github.com/cross-rs/cross.git
          # Docker is pre-installed on ubuntu-latest

      - name: Build Binaries (Linux & Windows via Cross)
        if: matrix.os == 'ubuntu-latest'
        run: |
          # Build Linux and Windows targets using cross in Docker
          npm run build-rust-prod
        working-directory: packages/mcu-debug
        env:
          CI: true

      - name: Build Binaries (Darwin Native)
        if: matrix.os == 'macos-latest'
        run: |
          # Build Darwin targets natively on macOS runner
          rustup target add aarch64-apple-darwin x86_64-apple-darwin
          bash ./scripts/build-binaries.sh prod
        env:
          CI: true

      - name: Upload Binaries Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.platform }}
          path: |
            packages/mcu-debug/bin/
            packages/mcu-debug-proxy/bin/

  package:
    name: Package VSIX
    needs: build-binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install -g @vscode/vsce

      - name: Download All Binaries
        uses: actions/download-artifact@v4
        with:
          path: bin-artifacts

      - name: Consolidate Binaries
        run: |
          # Combine binaries from all platforms into the extension bin directory
          mkdir -p packages/mcu-debug/bin
          mkdir -p packages/mcu-debug-proxy/bin
          
          # Copy from artifact directories
          cp -rn bin-artifacts/binaries-linux-windows/packages/mcu-debug/bin/* packages/mcu-debug/bin/ || true
          cp -rn bin-artifacts/binaries-darwin/packages/mcu-debug/bin/* packages/mcu-debug/bin/ || true
          
          # Sync to proxy extension
          bash ./scripts/sync-helper-binaries.sh
          
          echo "Final binary structure:"
          ls -R packages/mcu-debug/bin/

      - name: Build and Package
        run: |
          # Run the main packaging script which invokes esbuild and @vscode/vsce
          # SKIP_RUST_BUILD is set to prevent unnecessary and failing Rust compilation in this job
          bash ./scripts/package-extensions.sh
        env:
          CI: true
          SKIP_RUST_BUILD: true

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.vsix
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
